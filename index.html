<!DOCTYPE html>
<html>
<head>
    <title>ESP32-C3 数据曲线测试</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .info { background: #f5f5f5; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
        .chart-container { position: relative; height: 400px; }
        .data-table { margin-top: 30px; border-collapse: collapse; width: 100%; }
        .data-table th, .data-table td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .data-table th { background-color: #f2f2f2; }
        .status { padding: 10px; border-radius: 5px; margin-bottom: 15px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ESP32-C3 数据曲线测试</h1>
        
        <div class="info">
            <h3>测试说明</h3>
            <p>此页面使用实际数据测试曲线绘制功能，验证时间戳解析和Chart.js集成。</p>
            <p><strong>数据源</strong>: 仓库 <code>esp32c3-data-logger-tri</code> 的 <code>data.json</code></p>
            <p><strong>数据点</strong>: 3个 (2026-04-18 01:37:20 至 01:38:00)</p>
            <p><strong>预期结果</strong>: 显示包含3个点的折线图</p>
        </div>

        <div id="status" class="status"></div>

        <div class="chart-container">
            <canvas id="myChart"></canvas>
        </div>

        <div id="dataTable"></div>

        <div style="margin-top: 30px;">
            <h3>调试信息</h3>
            <div id="debugInfo"></div>
        </div>
    </div>

    <script>
        // 实际数据 (从 data.json 复制)
        const data = [
            {timestamp: "2026-04-18 01:38:00", value: 280},
            {timestamp: "2026-04-18 01:37:40", value: 215},
            {timestamp: "2026-04-18 01:37:20", value: 300}
        ];

        // 时间戳解析函数
        function parseTimestamp(timestamp) {
            // 方法1: 尝试解析字符串 "YYYY-MM-DD HH:MM:SS"
            const isoStr = timestamp.replace(' ', 'T') + 'Z';
            const date = new Date(isoStr);
            
            if (!isNaN(date.getTime())) {
                return date;
            }
            
            // 方法2: 尝试作为Unix时间戳（秒）
            const unixTime = parseInt(timestamp);
            if (!isNaN(unixTime)) {
                return new Date(unixTime * 1000);
            }
            
            // 方法3: 返回当前时间作为后备
            console.warn(`无法解析时间戳: ${timestamp}`);
            return new Date();
        }

        // 更新状态显示
        function updateStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
        }

        // 渲染数据表格
        function renderDataTable(data) {
            const table = document.createElement('table');
            table.className = 'data-table';
            
            const header = table.createTHead();
            const headerRow = header.insertRow();
            ['序号', '时间戳 (原始)', '解析后的时间', '数值'].forEach(text => {
                const th = document.createElement('th');
                th.textContent = text;
                headerRow.appendChild(th);
            });
            
            const body = table.createTBody();
            data.forEach((entry, index) => {
                const row = body.insertRow();
                const parsedTime = parseTimestamp(entry.timestamp);
                
                [index + 1, entry.timestamp, parsedTime.toLocaleString(), entry.value].forEach(text => {
                    const cell = row.insertCell();
                    cell.textContent = text;
                });
            });
            
            document.getElementById('dataTable').appendChild(table);
        }

        // 显示调试信息
        function showDebugInfo(data) {
            const debugDiv = document.getElementById('debugInfo');
            debugDiv.innerHTML = `
                <p><strong>数据点数量</strong>: ${data.length}</p>
                <p><strong>时间戳格式</strong>: ${data[0].timestamp}</p>
                <p><strong>数值范围</strong>: ${Math.min(...data.map(d => d.value))} - ${Math.max(...data.map(d => d.value))}</p>
                <p><strong>Chart.js版本</strong>: ${Chart.version}</p>
                <p><strong>时间戳解析测试</strong>: ${parseTimestamp(data[0].timestamp).toString()}</p>
            `;
        }

        // 初始化图表
        function initChart() {
            const ctx = document.getElementById('myChart').getContext('2d');
            
            // 准备图表数据
            const labels = data.map(entry => {
                const date = parseTimestamp(entry.timestamp);
                return date.toLocaleTimeString();
            });
            
            const chartData = {
                labels: labels,
                datasets: [{
                    label: '随机值',
                    data: data.map(entry => entry.value),
                    borderColor: 'rgb(75, 192, 192)',
                    backgroundColor: 'rgba(75, 192, 192, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.2
                }]
            };
            
            const config = {
                type: 'line',
                data: chartData,
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: {
                            display: true,
                            text: 'ESP32-C3 随机数据曲线'
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const originalTimestamp = data[context.dataIndex].timestamp;
                                    return `时间: ${originalTimestamp}, 数值: ${context.parsed.y}`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            title: {
                                display: true,
                                text: '时间'
                            }
                        },
                        y: {
                            title: {
                                display: true,
                                text: '随机值'
                            },
                            beginAtZero: false
                        }
                    }
                }
            };
            
            try {
                const chart = new Chart(ctx, config);
                updateStatus('✅ 图表绘制成功！', 'success');
                return chart;
            } catch (error) {
                updateStatus(`❌ 图表绘制失败: ${error.message}`, 'error');
                console.error('Chart error:', error);
                return null;
            }
        }

        // 页面加载完成后执行
        window.onload = function() {
            updateStatus('正在初始化...', '');
            
            // 验证数据
            if (!data || data.length === 0) {
                updateStatus('❌ 无数据可用', 'error');
                return;
            }
            
            updateStatus(`✅ 加载到 ${data.length} 个数据点`, 'success');
            
            // 渲染数据表格
            renderDataTable(data);
            
            // 显示调试信息
            showDebugInfo(data);
            
            // 初始化图表
            setTimeout(() => {
                initChart();
            }, 100);
        };
    </script>
</body>
</html>
