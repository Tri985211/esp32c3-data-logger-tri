name: Process Issues and Update Data

on:
  schedule:
    - cron: '*/5 * * * *'  # 每5分钟
  workflow_dispatch:       # 手动触发

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch open issues
        run: |
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/issues?state=open" \
            > issues.json

      - name: Parse issues and update data.json
        run: |
          if [ -s issues.json ]; then
            jq '[.[] | {timestamp: .title, value: (.body | capture("Random Value: (?<val>\\d+)").val | tonumber)}]' issues.json > data.json
          else
            echo "[]" > data.json
          fi
          cat data.json

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update data.json from issues"
            git push
          fi
