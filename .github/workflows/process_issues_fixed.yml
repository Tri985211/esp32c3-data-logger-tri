name: Process Issues and Update Data Fixed

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: read

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch open issues
        run: |
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/issues?state=open" \
            > issues.json

      - name: Parse issues and update data.json
        run: |
          if [ -s issues.json ]; then
            # 更简单的解析，直接提取数字
            jq '[.[] | {timestamp: .title, value: (.body | match("Random Value: ([0-9]+)").captures[0].string | tonumber)}]' issues.json > data.json
          else
            echo "[]" > data.json
          fi
          echo "Data content:"
          cat data.json

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update data.json from issues"
            git push
          fi
